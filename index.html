<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brew Book — The Coffee Passport</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>☕</text></svg>">

  <!-- Open Graph -->
  <meta property="og:title" content="Brew Book — The Coffee Passport">
  <meta property="og:description" content="38 coffee destinations. 22 countries. Your cinematic coffee passport.">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="theme-color" content="#241a14">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Karla:wght@400;500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="./css/tokens.css">
  <link rel="stylesheet" href="./css/base.css">
  <link rel="stylesheet" href="./css/components.css">
</head>
<body>

<!-- SHARED SVG DEFS -->
<svg width="0" height="0" style="position:absolute;overflow:hidden" aria-hidden="true">
  <defs>
    <linearGradient id="roastFull" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e9a25f"/><stop offset="45%" stop-color="#cf7f45"/><stop offset="100%" stop-color="#8f5526"/>
    </linearGradient>
    <linearGradient id="roastSheen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff3e2" stop-opacity=".85"/><stop offset="60%" stop-color="#fff3e2" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="gSteel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c9ccd1"/><stop offset="45%" stop-color="#8d9197"/><stop offset="100%" stop-color="#565a61"/>
    </linearGradient>
    <linearGradient id="gMilk" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fffaf0"/><stop offset="100%" stop-color="#e9dcc4"/>
    </linearGradient>
    <linearGradient id="gMango" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffd24a"/><stop offset="55%" stop-color="#f6a623"/><stop offset="100%" stop-color="#e07a1c"/>
    </linearGradient>
    <linearGradient id="gIce" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eaf6ff"/><stop offset="100%" stop-color="#a9d4ec"/>
    </linearGradient>
    <linearGradient id="gGreen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a7cf6a"/><stop offset="100%" stop-color="#5f8a32"/>
    </linearGradient>
    <linearGradient id="gCoffee" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6b4426"/><stop offset="100%" stop-color="#3a2415"/>
    </linearGradient>
    <linearGradient id="gGlass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity=".35"/><stop offset="100%" stop-color="#bcd6e6" stop-opacity=".18"/>
    </linearGradient>
    <linearGradient id="gJaggery" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#b9763a"/><stop offset="100%" stop-color="#7c4a1e"/>
    </linearGradient>
    <linearGradient id="gYolk" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffcf47"/><stop offset="100%" stop-color="#f0962a"/>
    </linearGradient>
  </defs>
</svg>

<!-- SPLASH -->
<div id="splash" class="splash" aria-hidden="true">
  <div class="splash-stars" id="splashStars"></div>
  <div class="splash-center">
    <svg class="splash-cup" viewBox="0 0 120 132" fill="none" aria-hidden="true">
      <path class="cup-draw" d="M22 52 H98 L92 106 a14 14 0 0 1-14 12 H50 a14 14 0 0 1-14-12 Z" stroke="#cf7f45" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>
      <path class="cup-draw" d="M98 63 a18 18 0 0 1 0 36" stroke="#cf7f45" stroke-width="2.6" stroke-linecap="round"/>
      <path class="cup-draw" d="M20 52 H100" stroke="#e9a25f" stroke-width="1.8" stroke-linecap="round"/>
      <path class="cup-steam s1" d="M42 45 C37 36 46 29 41 20" stroke="#cf7f45" stroke-width="2.2" stroke-linecap="round"/>
      <path class="cup-steam s2" d="M60 45 C55 36 64 29 59 20" stroke="#e9a25f" stroke-width="2.2" stroke-linecap="round"/>
      <path class="cup-steam s3" d="M78 45 C73 36 82 29 77 20" stroke="#cf7f45" stroke-width="2.2" stroke-linecap="round"/>
    </svg>
    <h1 class="splash-title">BREW <em>BOOK</em></h1>
    <p class="splash-tagline">38 DESTINATIONS · 22 COUNTRIES · YOUR COFFEE PASSPORT</p>
  </div>
  <button class="splash-skip" id="splashSkip">Skip intro →</button>
</div>

<!-- APP SHELL -->
<div id="app-shell" class="app-shell">

  <!-- SCREEN: RECIPES (home) -->
  <div id="screen-home" class="screen screen-home active" data-screen-label="Recipes">
    <div class="runway-strip" aria-hidden="true"></div>
    <header class="term-header">
      <div class="term-brand">
        <span class="cuplogo" aria-hidden="true">
          <svg viewBox="0 0 44 48" fill="none">
            <path class="w w1" d="M15 19 C11 14,19 10,15 5" stroke="#c9b59c" stroke-width="2.4" stroke-linecap="round"/>
            <path class="w w2" d="M22 19 C18 14,26 10,22 5" stroke="#cf7f45" stroke-width="2.4" stroke-linecap="round"/>
            <path class="w w3" d="M29 19 C25 14,33 10,29 5" stroke="#c9b59c" stroke-width="2.4" stroke-linecap="round"/>
            <path d="M9 23 H35 L32 41 a8 8 0 0 1-8 7 H20 a8 8 0 0 1-8-7 Z" fill="url(#roastFull)"/>
            <path d="M35 27 a7.5 7.5 0 0 1 0 15" stroke="#8f5526" stroke-width="2.2" fill="none"/>
          </svg>
        </span>
        <h1 class="brand-name">BREW <em>BOOK</em></h1>
      </div>
      <span class="count-pill" id="countPill">— BREWS</span>
    </header>

    <div class="toolbar">
      <div class="search-row">
        <div class="search-wrap">
          <svg class="search-icon" viewBox="0 0 16 16" fill="none" aria-hidden="true">
            <circle cx="6.5" cy="6.5" r="4.5" stroke="currentColor" stroke-width="1.6"/>
            <path d="M10 10 L14 14" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
          </svg>
          <input id="searchInput" class="search" type="text" placeholder="Search destinations or ingredients…" aria-label="Search recipes">
        </div>
        <!-- List / World view toggle -->
        <div class="view-toggle" id="viewToggle" role="group" aria-label="View mode">
          <button class="vt-seg active" data-view="list" aria-pressed="true">List</button>
          <button class="vt-seg" data-view="world" aria-pressed="false">World</button>
        </div>
        <select class="sort" id="sortSelect" aria-label="Sort">
          <option value="serial">Serial #</option>
          <option value="newest">Newest</option>
          <option value="rating">Top rated</option>
          <option value="name">A–Z</option>
        </select>
      </div>
      <div class="filter-rail" id="methodChips" role="group" aria-label="Filter by method"></div>
      <div class="tried-row">
        <div class="tried-control" id="triedChips" role="group" aria-label="Filter by status"></div>
        <div class="util-btns">
          <button class="util-btn" id="exportBtn" title="Backup recipes">⬇</button>
          <button class="util-btn" id="importBtn" title="Restore backup">⬆</button>
          <button class="util-btn util-add" id="addBtn" title="New recipe" aria-label="Add recipe">＋</button>
        </div>
      </div>
      <div class="kfilter" id="kfilter">
        <div class="if-collapsed" id="kitchenCollapsed">
          <span class="if-pan" aria-hidden="true">
            <svg viewBox="0 0 26 26" fill="none"><circle cx="11" cy="14" r="6.5" stroke="#cf7f45" stroke-width="1.6"/><path d="M11 9.5 a4.5 4.5 0 0 1 0 9" stroke="#e9a25f" stroke-width="1.4" fill="none" opacity=".5"/><path d="M17.5 14 L24 14" stroke="#cf7f45" stroke-width="1.6" stroke-linecap="round"/><path d="M9 4 C8 6,10 6.5,9 8.5 M12 4 C11 6,13 6.5,12 8.5" stroke="#c9b59c" stroke-width="1.2" stroke-linecap="round" fill="none" opacity=".7"/></svg>
          </span>
          <span class="if-prompt" id="kitchenPrompt">What's in your kitchen?</span>
          <div class="if-active-icons" id="kitchenIcons" style="display:none"></div>
          <button class="if-add" id="kitchenToggle" aria-label="Open ingredient filter">+</button>
        </div>
        <div class="if-expand" id="kitchenExpand" style="display:none">
          <div class="if-chips" id="kitchenChips" role="group" aria-label="Ingredients you have"></div>
          <div class="if-result" id="kitchenResult" style="display:none">
            <span class="if-result-txt">Showing <b id="kitchenCount">0</b> recipes you can make</span>
            <button class="if-clear" id="kitchenClear">Clear all</button>
          </div>
        </div>
      </div>
    </div>

    <!-- LIST VIEW: hero + category chips + lanes -->
    <div id="content" class="home-content"></div>

    <!-- WORLD VIEW: dotted-stipple map, toggled in-place -->
    <div id="world-view" class="world-view" style="display:none" aria-hidden="true">
      <canvas id="wvCanvas" class="wv-canvas" aria-hidden="true"></canvas>
      <svg id="wvSvg" class="wv-svg" aria-hidden="true">
        <g id="wvPins"></g>
      </svg>
      <div id="wvPreview" class="map-preview" style="display:none" role="tooltip"></div>
      <div class="wv-legend">
        <div class="legend-title">BREW METHODS</div>
        <div id="wvLegendItems" class="legend-items"></div>
      </div>
      <div class="wv-absent-note" id="wvAbsentNote" aria-live="polite"></div>
    </div>

    <input type="file" id="importFile" accept="application/json,.json" style="display:none" aria-hidden="true">
  </div>

  <!-- SCREEN: COLLECTION -->
  <div id="screen-collection" class="screen screen-collection" data-screen-label="Collection">
    <div class="collection-header">
      <div>
        <h2 class="collection-title">YOUR PASSPORT</h2>
        <p class="collection-sub">Brews you've landed</p>
      </div>
      <span class="count-pill" id="collectionCount">0 BOARDED</span>
    </div>
    <div id="collection-content" class="collection-content"></div>
  </div>

  <!-- BOTTOM NAV — two tabs only -->
  <nav id="bottom-nav" class="bottom-nav" aria-label="Main navigation">
    <button class="nav-tab active" data-target="screen-home" aria-current="page">
      <!-- recipes / passport icon -->
      <svg viewBox="0 0 22 22" fill="none" aria-hidden="true">
        <rect x="3" y="3" width="16" height="16" rx="2.5" stroke="currentColor" stroke-width="1.6"/>
        <path d="M7 8 H15" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
        <path d="M7 11.5 H13" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
        <path d="M7 15 H11" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
      </svg>
      <span>Recipes</span>
    </button>
    <button class="nav-tab" data-target="screen-collection">
      <svg viewBox="0 0 22 22" fill="none" aria-hidden="true">
        <rect x="3" y="4" width="16" height="14" rx="2.5" stroke="currentColor" stroke-width="1.6"/>
        <path d="M7 9 Q9 6 11 9 Q13 12 15 9" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
        <circle cx="11" cy="13" r="2.2" stroke="currentColor" stroke-width="1.3"/>
      </svg>
      <span>Collection</span>
    </button>
  </nav>
</div>

<!-- DETAIL PANEL -->
<div id="detail-panel" class="detail-panel" role="dialog" aria-modal="true" aria-label="Recipe detail" style="display:none"></div>

<!-- FORM PANEL -->
<div class="panel" id="formPanel" role="dialog" aria-modal="true" aria-label="Recipe form">
  <div class="sheet" id="formSheet"></div>
</div>

<!-- BREW MODE -->
<div id="brew-mode" class="brew-mode" role="dialog" aria-modal="true" aria-label="Brew mode" style="display:none">
  <div class="brew-stars" id="brewStars"></div>
  <div class="brew-glow" aria-hidden="true"></div>
</div>

<!-- TOAST -->
<div class="toast" id="toast" role="alert" aria-live="assertive"></div>

<!-- GSAP + Lenis -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/lenis/1.1.13/lenis.min.js"></script>

<!-- D3 + geo projections + topojson (for the world map) -->
<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
<script src="https://cdn.jsdelivr.net/npm/d3-geo-projection@4"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3"></script>

<!-- App -->
<script src="./js/data.js"></script>
<script src="./js/icons.js"></script>
<script src="./js/worldmap.js"></script>
<script src="./js/app.js"></script>
</body>
</html>
